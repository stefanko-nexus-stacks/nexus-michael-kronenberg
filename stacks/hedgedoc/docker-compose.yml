# =============================================================================
# HedgeDoc - Collaborative real-time Markdown editor
# =============================================================================
# Self-hosted HackMD/StackEdit-style editor. Real-time multi-user
# editing, MathJax / Mermaid / KaTeX / PlantUML rendering, slide-mode
# (revealjs), version history.
#
# Auth model (post-#618):
#   1. Cloudflare Access (email OTP) gates who reaches the login
#      page at the edge.
#   2. HedgeDoc itself runs with email signup DISABLED — the
#      services-configure hook seeds ONE admin account from
#      Infisical-stored credentials (HEDGEDOC_USERNAME / HEDGEDOC_PASSWORD).
#      Self-signup is off so the user-pool stays at exactly one.
#   3. Anonymous edits are disabled so notes have a clear owner.
#
# Persistence:
#   - hedgedoc-db Postgres → captured by s3_restore.standard_targets
#     via pg_dump on teardown, restored on spin-up.
#   - hedgedoc-uploads bind-mount on /mnt/nexus-data/hedgedoc/uploads
#     → captured by rsync. The bind-mount itself is ephemeral host
#     storage (RFC 0001) but the R2 snapshot/restore cycle preserves
#     the content across teardowns.
#
# Access: https://hedgedoc.YOUR_DOMAIN (Cloudflare Access at the
# edge + HedgeDoc-side admin login).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # HedgeDoc - Web UI
  # ---------------------------------------------------------------------------
  hedgedoc:
    image: ${IMAGE_HEDGEDOC:-quay.io/hedgedoc/hedgedoc:1.10.3}
    container_name: hedgedoc
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "3110:3000"
    environment:
      # Database
      CMD_DB_URL: postgres://nexus-hedgedoc:${HEDGEDOC_DB_PASSWORD}@hedgedoc-db:5432/hedgedoc
      # Public URL — composed at render time so the OAuth /
      # absolute-link generation matches what CF Access serves.
      CMD_DOMAIN: ${HEDGEDOC_DOMAIN}
      CMD_URL_ADDPORT: "false"
      CMD_PROTOCOL_USESSL: "true"
      # Auth: email signup is disabled — the seeded admin account is
      # the only way in. CF Access at the edge gates "who reaches the
      # login page", HedgeDoc's own login form is the in-app identity.
      # Anonymous editing is disabled so every note has an owner.
      # `CMD_DEFAULT_PERMISSION=private` makes newly-created notes
      # visible only to the owner; the owner can flip individual
      # notes to `editable` / `freely` via the per-note UI.
      CMD_ALLOW_EMAIL_REGISTER: "false"
      CMD_ALLOW_ANONYMOUS: "false"
      CMD_ALLOW_ANONYMOUS_EDITS: "false"
      CMD_ALLOW_FREEURL: "false"
      CMD_DEFAULT_PERMISSION: "private"
      # Session secret — random 32+ chars from Tofu (Infisical-backed)
      CMD_SESSION_SECRET: ${HEDGEDOC_SESSION_SECRET}
    volumes:
      # Bind-mount onto /mnt/nexus-data/hedgedoc/uploads so the R2
      # snapshot/restore cycle (s3_restore.standard_targets) can
      # rsync it. Named volumes can't be rsynced without
      # `--volumes-from` gymnastics. Path is mkdir+chowned to 10000:10000
      # (the in-container `hedgedoc` user) by compose_runner's
      # hedgedoc_uploads_prep block before this compose-up runs.
      - /mnt/nexus-data/hedgedoc/uploads:/hedgedoc/public/uploads
    depends_on:
      hedgedoc-db:
        condition: service_healthy
    networks:
      - app-network
      - hedgedoc-internal
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # HedgeDoc - Dedicated PostgreSQL
  # ---------------------------------------------------------------------------
  hedgedoc-db:
    image: ${IMAGE_HEDGEDOC_DB:-postgres:16-alpine}
    container_name: hedgedoc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus-hedgedoc
      POSTGRES_PASSWORD: ${HEDGEDOC_DB_PASSWORD}
      POSTGRES_DB: hedgedoc
    volumes:
      - hedgedoc-db-data:/var/lib/postgresql/data
    networks:
      - hedgedoc-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus-hedgedoc -d hedgedoc"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hedgedoc-db-data:

networks:
  app-network:
    external: true
  hedgedoc-internal:
    driver: bridge
